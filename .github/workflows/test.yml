name: Tests

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  unit-integration-property:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: pytest tests/unit tests/integration tests/property tests/psa -v --tb=short --cov=cim_ontology --cov-report=term
      - run: ruff check src tests
      - run: mypy src

  e2e:
    runs-on: ubuntu-latest
    needs: unit-integration-property
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # LLM 缓存（跨 PR 复用）
      - uses: actions/cache@v4
        with:
          path: .cache/llm_reviews.db
          key: llm-cache-${{ hashFiles('src/cim_ontology/reviewer/prompts.py') }}
          restore-keys: |
            llm-cache-

      - run: pip install -e ".[dev]"
      - name: E2E build（强制 Mock LLM）
        run: cim-ontology build --input tests/fixtures/large/full.md --output ./build --format owl
        env:
          CI: true
      - run: pytest tests/e2e -v --tb=short
      - uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: build/

      # 持久化缓存
      - uses: actions/cache/save@v4
        with:
          path: .cache/llm_reviews.db
          key: llm-cache-${{ hashFiles('src/cim_ontology/reviewer/prompts.py') }}